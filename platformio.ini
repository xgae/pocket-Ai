; ╔══════════════════════════════════════════════════════════════╗
; ║           Pocket-AI Terminal — PlatformIO Config             ║
; ╚══════════════════════════════════════════════════════════════╝
; Flash with:  pio run -t upload
; Monitor  :   pio device monitor

[env:d1_mini_lite]
platform  = espressif8266
board     = d1_mini_lite
framework = arduino

; ── Serial ──────────────────────────────────────────────────────
monitor_speed = 115200

; ── Build flags ─────────────────────────────────────────────────
build_flags =
    ; Low-memory lwIP saves ~10 KB heap vs the default lwIP2 full build
    -D PIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY
    ; Silence SDK/WiFi debug noise on the serial port
    -D CORE_DEBUG_LEVEL=0
    ; U8g2: skip unused font-kerning tables (saves a few KB of flash)
    -D U8G2_WITHOUT_FONT_KERNING
    ;
    ; *** BEARSSL_SSL_BASIC is intentionally NOT set here ***
    ;
    ; BEARSSL_SSL_BASIC restricts bearSSL to RSA key-exchange cipher suites
    ; (TLS_RSA_WITH_AES_*).  Cloudflare (which fronts api.groq.com) has
    ; deprecated RSA key exchange and accepts ONLY ECDHE cipher suites
    ; (TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256, etc.).  When a ClientHello
    ; offers only RSA ciphers, Cloudflare returns a fatal TLS decode_error
    ; alert instead of the more descriptive handshake_failure.
    ; Removing the flag restores the full bearSSL cipher profile which
    ; includes ECDHE and lets the handshake succeed.

; ── Partition / Flash ────────────────────────────────────────────
board_build.flash_size = 1MB
board_build.ldscript   = eagle.flash.1m64.ld

; ── Libraries ───────────────────────────────────────────────────
lib_deps =
    olikraus/U8g2 @ ^2.35.30
    bblanchon/ArduinoJson @ ^6.21.5

; ── Upload ──────────────────────────────────────────────────────
upload_speed = 921600
